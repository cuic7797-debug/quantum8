function calc(n) {
  const sum = n.reduce((a,b)=>a+b,0);
  const odd = n.filter(x=>x%2===1).length;
  const z=[0,0,0,0]; n.forEach(x=>{if(x<=20)z[0]++;else if(x<=40)z[1]++;else if(x<=60)z[2]++;else z[3]++;});
  let cc=0,s=1; for(let i=1;i<n.length;i++){if(n[i]===n[i-1]+1)s++;else{if(s>=2)cc++;s=1;}} if(s>=2)cc++;
  return {sum_value:sum,span:n[19]-n[0],odd_count:odd,even_count:20-odd,big_count:n.filter(x=>x>=41).length,small_count:n.filter(x=>x<=40).length,zone1_count:z[0],zone2_count:z[1],zone3_count:z[2],zone4_count:z[3],consecutive_count:cc,repeat_count:0};
}

function log(msg, cls) {

async function run() {
  const btn = document.getElementById('btn');

  log('开始导入...');

  for (const draw of draws) {
    const row = { draw_number: draw.d, draw_date: draw.dt, numbers: draw.n, ...calc(draw.n) };
    try {
      const r = await fetch(URL + '/rest/v1/draws', {

        headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },

        const err = await r.json();

          log('ALTER TABLE draws DISABLE ROW LEVEL SECURITY;');
          log('然后再回来点导入按钮');

        log('⚠️ ' + draw.d + ': ' + (err.message || '未知错误'), 'err');
